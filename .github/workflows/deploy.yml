name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Ensure correct base path for GitHub Pages
        run: |
          if ! grep -q "base:" vite.config.ts; then
            sed -i "s|plugins: \[react(), tailwindcss()\],|base: '/Cartoon-Smash-Academy/',\n    plugins: [react(), tailwindcss()],|" vite.config.ts
          fi

      - name: Build project
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
